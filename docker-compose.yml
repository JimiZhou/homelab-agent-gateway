services:
  homelab-agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: homelab-agent-gateway:latest
    container_name: homelab-agent-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8088}:8088"
    volumes:
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-UTC}
      PUBLIC_MODEL: ${PUBLIC_MODEL:-homelab-agent}
      LLM_MODEL: ${LLM_MODEL:-local-text}
      VISION_MODEL: ${VISION_MODEL:-local-vision}
      GATEWAY_PORT: 8088
      GATEWAY_CONFIG_PATH: /data/config.json
      REQUEST_LOG_PATH: /data/request_log.jsonl
      MODEL_UPSTREAMS: ${MODEL_UPSTREAMS:-local-text=http://host.docker.internal:8001/v1,local-vision=http://host.docker.internal:8002/v1}
      ENABLE_VISION_FUSION: ${ENABLE_VISION_FUSION:-true}
      ENABLE_AUTO_CONTEXT: ${ENABLE_AUTO_CONTEXT:-true}
      ENABLE_COMMERCIAL_FALLBACK: ${ENABLE_COMMERCIAL_FALLBACK:-false}
      DEFAULT_MAX_TOKENS: ${DEFAULT_MAX_TOKENS:-1024}
      MAX_TOOL_ITERATIONS: ${MAX_TOOL_ITERATIONS:-4}
      TOOL_HTTP_TIMEOUT: ${TOOL_HTTP_TIMEOUT:-8}
      MAX_FETCH_BYTES: ${MAX_FETCH_BYTES:-262144}
      MAX_TOOL_TEXT_CHARS: ${MAX_TOOL_TEXT_CHARS:-12000}
      MAX_VISION_ITEMS: ${MAX_VISION_ITEMS:-6}
      MAX_VISION_MEDIA_BYTES: ${MAX_VISION_MEDIA_BYTES:-4194304}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
      COMMERCIAL_FALLBACK_BASE_URL: ${COMMERCIAL_FALLBACK_BASE_URL:-}
      COMMERCIAL_FALLBACK_MODEL: ${COMMERCIAL_FALLBACK_MODEL:-}
      COMMERCIAL_FALLBACK_API_KEY: ${COMMERCIAL_FALLBACK_API_KEY:-}
      COMMERCIAL_FALLBACK_POLICY: ${COMMERCIAL_FALLBACK_POLICY:-error_or_empty}
